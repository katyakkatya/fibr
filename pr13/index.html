<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Заметки (13-18)</title>
    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>
    <div class="notes">
      <h1>Заметки</h1>
      <form id="note-form" class="row">
        <input
          class="col-9"
          type="text"
          id="note-input"
          placeholder="Введите заметку"
          required
        />
        <button class="col-3" type="submit">Добавить</button>
      </form>
      <ul id="notes-list"></ul>
    </div>
    <script src="app.js"></script>
  </body>
</html>
