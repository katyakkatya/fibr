<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Заметки (13-18)</title>
    <link rel="stylesheet" href="./style.css" />
    <meta charset="UTF-8" />
    <!-- Web App Manifest -->
    <link rel="manifest" href="./manifest.json" />
    <!-- Для Android -->
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- Цвет темы для браузера -->
    <meta name="theme-color" content="#4285f4" />
    <!-- Для iOS (иконка на домашний экран) -->
    <link rel="apple-touch-icon" href="./icons/icon-512x512.png" />
    <!-- Для iOS (статус бар) -->
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="blacktranslucent"
    />
    
  </head>

  <body>
    <div class="notes">
      <h1>Заметки</h1>
      <form id="note-form" class="row">
        <input
          class="col-9"
          type="text"
          id="note-input"
          placeholder="Введите заметку"
          required
        />
        <button class="col-3" type="submit">Добавить</button>
      </form>
      <ul id="notes-list"></ul>
    </div>
    <script src="app.js"></script>
  </body>
</html>
